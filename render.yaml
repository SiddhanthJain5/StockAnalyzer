services:
  - type: web
    name: finance-analyzer
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn webapp.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: CACHE_TTL_SECONDS
        value: "3600"
      - key: RATE_LIMIT_PER_HOUR
        value: "60"
